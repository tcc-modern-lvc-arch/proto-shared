syntax = "proto3";
package event;

option java_multiple_files = true;
option java_package = "io.github.raphonzius.lvc.proto.event";
option java_outer_classname = "EventHubProto";

// Indicates whether data comes from a Live, Virtual or Constructive source (LVC).
// All clients MUST set this field so dashboards and analysis can filter by origin.
enum LvcOrigin {
  LIVE         = 0;
  VIRTUAL      = 1;
  CONSTRUCTIVE = 2;
}

// All events represent a state change of an entity.
//
// MOVE     — position update; produced continuously by every moving entity.
//            This is by far the most frequent event (high-throughput path).
// CHECKIN  — entity entered a virtual area; produced by virtual-areas-ms-java.
// CHECKOUT — entity left a virtual area; produced by virtual-areas-ms-java.
// PHOTO    — drone captured a JPEG frame; request issued by virtual-areas-ms-java
//            when a bus enters a monitored area (e.g. Mackenzie campus).
// CRASH    — drone collided with an obstacle; produced by constructive-airsim-ms-python.
//            DronePayload.severity and DronePayload.collision_object are populated.
enum EventKind {
  MOVE     = 0; // default — omitting the field means MOVE
  CHECKIN  = 1;
  CHECKOUT = 2;
  PHOTO    = 3;
  CRASH    = 4;
}

enum EntityType {
  DRONE      = 0;
  VESSEL     = 1;
  BUS        = 2;
  FLOOD_AREA = 3;
  RAIN_AREA  = 4;
}

// ── Shared geometry ───────────────────────────────────────────────────────────

message Location {
  double lat               = 1;
  double lon               = 2;
  optional double altitude_m = 3;
}

// Target POI for MISSION_TRIGGER checkin events — tells constructive-airsim-ms-python where to dispatch the drone.
message MissionTarget {
  double          lat        = 1;
  double          lon        = 2;
  optional double altitude_m = 3;
  string          poi_name   = 4;
  string          poi_id     = 5;
}

// ── Per-source payloads ───────────────────────────────────────────────────────

// constructive-airsim-ms-python: simulated drone
message DronePayload {
  Location        location         = 1;
  optional float  speed_ms         = 2; // m/s
  optional float  heading_deg      = 3; // 0-360
  optional bytes  picture_jpeg     = 4; // raw JPEG frame — only set on PHOTO events
  optional float  severity         = 5; // 0.0-1.0 — only set on CRASH events
  optional string collision_object = 6; // obstacle name — only set on CRASH events
}

// live-ms-java: AIS Friends API (real vessels)
message VesselPayload {
  Location        location    = 1;
  optional string mmsi        = 2;
  optional string vessel_name = 3;
  optional float  speed_knots = 4;
  optional float  heading_deg = 5;
  optional string destination = 6;
  optional string ship_type   = 7;
}

// live-ms-java: API Olho Vivo (real buses)
message BusPayload {
  Location        location   = 1;
  optional string line_code  = 2;
  optional string vehicle_id = 3;
  optional float  speed_kmh  = 4;
}

// live-ms-java: CGE SP feign — flooded area state update.
message FloodAreaPayload {
  Location        centroid       = 1;
  optional float  radius_meters  = 2;
  repeated Location polygon      = 3;
  optional string severity       = 4; // "leve" | "moderado" | "grave"
  optional float  water_level_cm = 5;
}

// live-ms-java: CRAAM-FAU weather data
message RainAreaPayload {
  Location        centroid        = 1;
  repeated Location polygon       = 2;
  optional float  intensity_mm_h  = 3; // mm/h
  optional string severity        = 4;
  optional float  accumulation_mm = 5;
}

// ── Main event envelope ───────────────────────────────────────────────────────

message EventRequest {
  string     area_id      = 1; // routing key — area lifecycle managed by virtual-areas-ms-java
  string     source       = 2; // "airsim" | "ais" | "olhovivo" | "cge" | "craam" | "virtual-areas"
  EventKind  event_kind   = 3; // defaults to MOVE when omitted
  EntityType entity_type  = 4;
  LvcOrigin  lvc          = 5;
  uint64     timestamp_ms = 6; // Unix epoch ms; hub uses server time if 0
  string     entity_id    = 7; // MMSI, vehicle_id, drone_id, area_code, ...

  oneof payload {
    DronePayload     drone      = 10;
    VesselPayload    vessel     = 11;
    BusPayload       bus        = 12;
    FloodAreaPayload flood_area = 13;
    RainAreaPayload  rain_area  = 14;
  }

  // Only present on CHECKIN events for MISSION_TRIGGER areas.
  optional MissionTarget mission_target = 15;
}

message EventAck {
  string          event_id      = 1;
  string          status        = 2; // "accepted" | "rejected"
  optional string error_message = 3;
}

// Subscribers select one entity type as the primary topic.
// The hub maintains one broadcast channel per EntityType.
message SubscribeRequest {
  EntityType         entity_type = 1;
  optional LvcOrigin lvc_filter  = 2; // absent = all LVC origins
}

// ── Service ───────────────────────────────────────────────────────────────────

service EventHub {
  // Ingests a single state-change event from any source microservice.
  rpc SendEvent(EventRequest) returns (EventAck);

  // Streams all events for the requested EntityType in real-time.
  rpc Subscribe(SubscribeRequest) returns (stream EventRequest);
}
