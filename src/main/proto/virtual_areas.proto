syntax = "proto3";
package virtual_areas;

option java_multiple_files = true;
option java_package = "io.github.raphonzius.lvc.proto.virtualareas";
option java_outer_classname = "VirtualAreasProto";

// gRPC server exposed BY virtual-areas-ms-java.
// Primary consumer: constructive-airsim-ms-python (checks if drone is near a POI or inside an area).
service AreaService {
  rpc CheckEntityInArea(CheckRequest)       returns (CheckResponse);
  rpc GetActiveAreas(GetActiveAreasRequest) returns (GetActiveAreasResponse);
}

message CheckRequest {
  string entity_id   = 1;
  string entity_type = 2; // "DRONE" | "BUS" | "VESSEL"
  double latitude    = 3;
  double longitude   = 4;
  optional double altitude_m = 5;
}

message CheckResponse {
  repeated AreaMatch matched_areas = 1;
}

message AreaMatch {
  string area_id   = 1;
  string area_name = 2;
  string status    = 3; // "ENTERED" | "INSIDE" | "EXITED" | "OUTSIDE"
}

message GetActiveAreasRequest {
  optional string entity_type_filter = 1; // absent = all entity types
}

message GetActiveAreasResponse {
  repeated AreaSummary areas = 1;
}

message AreaSummary {
  string area_id                         = 1;
  string name                            = 2;
  string area_type                       = 3; // "POLYGON" | "CIRCLE" | "CORRIDOR"
  repeated string monitored_entity_types = 4;
  string action                          = 5; // "CHECKIN_CHECKOUT" | "MISSION_TRIGGER"
  string target_poi_id                   = 6; // empty string if none
  bool   patrol_zone                     = 7; // true → area is a drone patrol boundary
}
